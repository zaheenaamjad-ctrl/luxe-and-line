kind = "web"
previewPath = "/"
title = "Luxe & Line"
version = "1.0.0"
id = "artifacts/luxe-and-line"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26101

[services.development]
run = "pnpm --filter @workspace/luxe-and-line run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxe-and-line", "run", "build" ]
publicDir = "artifacts/luxe-and-line/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26101"
BASE_PATH = "/"
